household_check_things_left_on:
  alias: 'Household: Check things left on'
  description: 'Checks group.lights and group.switches for anything left on. Sends
    an actionable notification if things are on, flashes bedroom light green if all
    clear at bedtime. Replaces whats_on.py. Called by bedtime and everyone-left-home
    automations.

    '
  fields:
    reason:
      description: Why the check was triggered e.g. Bedtime or Everyone left home
      required: true
      example: Bedtime
      selector:
        text:
  sequence:
  - variables:
      lights_on: "{{ expand('group.lights')\n   | selectattr('state', 'eq', 'on')\n
        \  | map(attribute='attributes.friendly_name')\n   | list }}\n"
      switches_on: "{{ expand('group.switches')\n   | selectattr('state', 'eq', 'on')\n
        \  | map(attribute='attributes.friendly_name')\n   | list }}\n"
      things_on: '{{ lights_on + switches_on }}'
      count: '{{ things_on | count }}'
      is_bedtime: '{{ reason == ''Bedtime'' }}'
  - if:
    - condition: template
      value_template: '{{ count == 0 }}'
    then:
    - if:
      - condition: template
        value_template: '{{ is_bedtime }}'
      then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.bedtimechecked
      - action: light.turn_on
        target:
          entity_id: light.master_bedroom
        data:
          rgb_color:
          - 0
          - 255
          - 65
          brightness: 40
          transition: 1
      - delay:
          seconds: 4
      - action: light.turn_off
        target:
          entity_id: light.master_bedroom
        data:
          transition: 1
    else:
    - if:
      - condition: template
        value_template: '{{ is_bedtime }}'
      then:
      - action: light.turn_on
        target:
          entity_id: light.master_bedroom
        data:
          rgb_color:
          - 255
          - 0
          - 65
          brightness: 40
          transition: 1
      - delay:
          seconds: 4
      - action: light.turn_off
        target:
          entity_id: light.master_bedroom
        data:
          transition: 1
    - action: notify.mobile_app_pixel_9_pro_xl
      data:
        title: Something left on
        message: "{% if count == 1 %}\n  {{ reason }} and {{ things_on[0] }} was left
          on. What should I do?\n{% else %}\n  {{ reason }} and {{ count }} things
          were left on: {{ things_on | join(', ') }}. What should I do?\n{% endif
          %}"
        data:
          actions:
          - action: turnoff
            title: Turn all off
          - action: leaveon
            title: Leave it
          tag: turnoff
          sticky: 'true'
  mode: single
  icon: mdi:lightbulb-question
