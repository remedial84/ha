household_announce_washing_done:
  alias: 'Household: Announce washing done'
  description: 'Announces washing is complete. Picks a random person who is home and
    tells them it''s their turn to hang it out. Mon gets Burmese notification and
    announcement if she''s home. Replaces washing_complete.py.

    '
  sequence:
  - variables:
      people_home: '{{ states.person | selectattr(''state'', ''eq'', ''home'') | map(attribute=''entity_id'')
        | list }}'
      mon_home: '{{ is_state(''person.mon'', ''home'') }}'
      lucky_person: '{{ people_home | random if people_home | count > 0 else ''''
        }}'
      friendly_name: '{{ state_attr(lucky_person, ''friendly_name'') }}'
      nicknames: '{{ state_attr(lucky_person, ''nicknames'') or [] }}'
      all_names: '{{ [friendly_name] + nicknames }}'
      chosen_name: '{{ all_names | random }}'
      burmese_name: '{{ state_attr(lucky_person, ''burmese_name'') | default(chosen_name)
        }}'
      fallback_en: '{% if people_home | count > 0 %}The washing is finished. It is
        {{ lucky_person }}''s turn to hang it out.{% else %}The washing is finished.
        Whoever is home next hangs it out!{% endif %}'
      fallback_my: '{% if people_home | count > 0 %}အဝတ်လျှော်ခြင်း ပြီးပါပြီ။ {{
        lucky_person }} ရဲ့ အလှည့်ပါ။{% else %}အဝတ်လျှော်ခြင်း ပြီးပါပြီ။ နောက်မှ
        အိမ်ရောက်သူ ဆွဲတင်ပါ။{% endif %}'
      arrival_context: '{{ chosen_name }} has just been selected to hang out the washing.'
  - action: ai_task.generate_data
    data:
      task_name: Home announcement
      instructions: '{{ arrival_context }} Generate two short announcements for a
        smart home speaker. English: clever, slightly sarcastic. Use the name {{ chosen_name
        }}. Under 30 words. Burmese: clever, slightly sarcastic, natural. Use the
        name {{ burmese_name }}. Under 30 words. Return ONLY valid JSON with no other
        text, markdown or backticks: {"english": "the english message", "burmese":
        "the burmese message"}. Do not wrap in markdown code fences or backticks.'
    response_variable: ai_response
  - variables:
      final_en: "{% set raw = ai_response.data | default('') | trim\n   | regex_replace('```json',
        '') | regex_replace('```', '') | trim %}\n{% if raw | length > 10 and '{'
        in raw and 'english' in raw %}\n  {% set parsed = raw | from_json %}\n  {{
        parsed.english | default(fallback_en) }}\n{% else %}\n  {{ fallback_en }}\n{%
        endif %}"
      final_my: "{% set raw = ai_response.data | default('') | trim\n   | regex_replace('```json',
        '') | regex_replace('```', '') | trim %}\n{% if raw | length > 10 and '{'
        in raw and 'burmese' in raw %}\n  {% set parsed = raw | from_json %}\n  {{
        parsed.burmese | default(fallback_my) }}\n{% else %}\n  {{ fallback_my }}\n{%
        endif %}"
  - parallel:
    - action: notify.mobile_app_pixel_9_pro_xl
      data:
        title: Washing
        message: '{{ final_en }}'
    - action: notify.mobile_app_mon_pixel_9_pro_fold
      data:
        title: အဝတ်လျှော်
        message: '{{ final_my }}'
    - action: notify.twelve
      data:
        message: '{{ final_en }}'
        target: '753490873274204211'
    - if:
      - condition: template
        value_template: '{{ mon_home }}'
      then:
      - action: script.household_announce_message
        data:
          message: '{{ final_my }}'
          entity_id: media_player.mons_office_speaker
          language: my
      - delay:
          hours: 0
          minutes: 0
          seconds: 5
          milliseconds: 0
      - action: script.household_announce_message
        data:
          message: '{{ final_en }}'
          entity_id: media_player.mini_speakers
      else:
      - action: script.household_announce_message
        data:
          message: '{{ final_en }}'
          entity_id: media_player.mini_speakers
  mode: single
  icon: mdi:washing-machine
household_announce_message:
  alias: 'Household: Announce message'
  description: 'Reusable TTS announcement script. Pauses playing media, makes the
    announcement, then resumes. English uses Google Cloud TTS (Wavenet voice), Burmese
    uses Google Translate TTS. Replaces announcement.py.

    '
  fields:
    message:
      description: The message to announce
      required: true
      example: The front door is open
      selector:
        text:
    entity_id:
      description: Media player to announce on (defaults to mini_speakers)
      required: false
      example: media_player.living_room_speaker
      selector:
        entity:
          domain: media_player
    language:
      description: Language code. en-AU for English, my for Burmese. Defaults to en-AU.
      required: false
      example: my
      selector:
        select:
          options:
          - en-AU
          - my
  sequence:
  - variables:
      target_entity: '{{ entity_id | default(''media_player.mini_speakers'') }}'
      tts_language: '{{ language | default(''en-AU'') }}'
      is_playing: '{{ is_state(target_entity, ''playing'') }}'
  - if:
    - condition: template
      value_template: '{{ is_playing }}'
    then:
    - action: media_player.media_pause
      target:
        entity_id: '{{ target_entity }}'
    - delay:
        milliseconds: 500
  - if:
    - condition: template
      value_template: '{{ tts_language == ''en-AU'' }}'
    then:
    - action: tts.google_cloud_say
      data:
        entity_id: '{{ target_entity }}'
        message: '{{ message }}'
    else:
    - action: tts.google_translate_say
      data:
        entity_id: '{{ target_entity }}'
        message: '{{ message }}'
        language: '{{ tts_language }}'
  - delay:
      seconds: '{{ [3, (message | length / 8) | int] | max }}'
  - if:
    - condition: template
      value_template: '{{ is_playing }}'
    then:
    - action: media_player.media_play
      target:
        entity_id: '{{ target_entity }}'
  mode: parallel
  max: 5
  icon: mdi:bullhorn
presence_announce_arrival_or_departure:
