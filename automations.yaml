- id: away_mode_everyone_left
  alias: 'Presence: Away mode — Everyone left home'
  description: 'When the last resident leaves: turn off lights and switches, close
    shutters, turn off AC, and arm Frigate for full detection.

    '
  triggers:
  - trigger: state
    entity_id: group.residents
    to: not_home
    for:
      minutes: 5
  conditions:
  - condition: state
    entity_id: group.residents
    state: not_home
  actions:
  - action: scene.create
    data:
      scene_id: pre_away_climate
      snapshot_entities:
      - climate.living
      - climate.kitchen
      - climate.office
      - climate.higgins_moon
      - climate.valerie
      - climate.wesley
  - parallel:
    - action: light.turn_off
      target:
        entity_id: all
    - action: switch.turn_off
      target:
        entity_id:
        - switch.pond_lights
        - switch.dehumidifier
    - action: cover.close_cover
      target:
        entity_id:
        - cover.family_room_window
        - cover.living_room_small_window
        - cover.living_room_big_window
        - cover.office_window
        - cover.valerie_window
    - action: climate.turn_off
      target:
        entity_id:
        - climate.living
        - climate.kitchen
        - climate.office
        - climate.higgins_moon
        - climate.valerie
        - climate.wesley
    - action: switch.turn_on
      target:
        entity_id:
        - switch.northwest_detect
        - switch.northwest_motion
        - switch.northwest_recordings
        - switch.northwest_snapshots
        - switch.northwest_review_alerts
        - switch.northwest_review_detections
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.away_mode
  - action: notify.mobile_app_pixel_9_pro_xl
    data:
      title: Away mode active
      message: Everyone has left. Lights off, shutters closed, Frigate armed.
  mode: single
- id: away_mode_someone_returned
  alias: 'Presence: Away mode — Someone returned home'
  description: 'When the first resident returns: turn on welcome lights, open shutters,
    restore AC, disarm Frigate back to normal detection.

    '
  triggers:
  - trigger: state
    entity_id:
    - person.chris
    - person.mon
    - person.valerie
    - person.wesley
    - person.amanda
    - person.angus
    - person.andy
    - person.bill
    - person.brian
    - person.cameron
    - person.frances
    - person.lauren
    - person.madeleine
    - person.sabrina
    - person.yin_lay
    - person.than_htay
    - person.lisa
    - person.jake
    - person.kye
    to: home
  conditions:
  - condition: state
    entity_id: input_boolean.away_mode
    state: 'on'
  actions:
  - parallel:
    - action: light.turn_on
      target:
        entity_id: light.front_steps
      data:
        brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id: light.foyer
      data:
        brightness_pct: 80
    - action: light.turn_on
      target:
        entity_id:
        - light.living_room_downlight_1
        - light.living_room_downlight_2
        - light.living_room_downlight_3
        - light.living_room_downlight_4
        - light.living_room_downlight_5
        - light.living_room_downlight_6
      data:
        brightness_pct: 30
    - action: cover.open_cover
      target:
        entity_id:
        - cover.family_room_window
        - cover.living_room_small_window
        - cover.living_room_big_window
        - cover.office_window
        - cover.valerie_window
    - action: scene.turn_on
      target:
        entity_id: scene.pre_away_climate
    - action: switch.turn_on
      target:
        entity_id:
        - switch.northwest_detect
        - switch.northwest_motion
        - switch.northwest_recordings
        - switch.northwest_review_alerts
        - switch.northwest_review_detections
    - action: switch.turn_off
      target:
        entity_id: switch.northwest_snapshots
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.away_mode
  mode: single
- id: frigate_front_door_person
  alias: 'Security: Announce person at front door — Frigate detection'
  description: 'When Frigate detects a person at the front door zone, announce on
    speakers and send a notification with snapshot. Acts as a doorbell substitute.

    '
  triggers:
  - trigger: mqtt
    topic: frigate/events
    payload: new
    value_template: '{{ value_json.type }}'
  conditions:
  - condition: template
    value_template: "{{ trigger.payload_json.after.label == 'person'\n   and trigger.payload_json.after.entered_zones
      | length > 0 }}\n"
  - condition: state
    entity_id: group.residents
    state: home
  - condition: template
    value_template: '{{ (as_timestamp(now()) - as_timestamp(states.automation.security_announce_person_at_front_door_frigate_detection.attributes.last_triggered
      | default(''1970-01-01''))) > 120 }}

      '
  actions:
  - variables:
      camera: '{{ trigger.payload_json.after.camera }}'
      snapshot_url: https://ha.remedial.me/api/frigate/notifications/{{ trigger.payload_json.after.id
        }}/snapshot.jpg
  - parallel:
    - action: script.household_announce_message
      data:
        message: Someone is at the front door.
        entity_id: media_player.mini_speakers
    - action: notify.mobile_app_pixel_9_pro_xl
      data:
        title: Front door
        message: Someone is at the front door.
        data:
          image: '{{ snapshot_url }}'
          url: https://ha.remedial.me/lovelace
          tag: front_door
    - action: notify.mobile_app_mon_pixel_9_pro_fold
      data:
        title: တံခါးရှေ့မှာ လူရှိနေပါတယ်
        message: တံခါးရှေ့မှာ လူရှိနေပါတယ်
        data:
          image: '{{ snapshot_url }}'
          tag: front_door
  mode: single
- id: kids_bedtime_30min_warning
  alias: 'Valerie: Bedtime 30 minute warning — 8:00pm'
  description: 30 minute warning before 8:30pm bedtime
  triggers:
  - trigger: time
    at: '20:00:00'
  conditions: []
  actions:
  - variables:
      kids_home: '{% set kids = [] %} {% if is_state(''person.valerie'', ''home'')
        %}{% set kids = kids + [''Valerie''] %}{% endif %} {% if is_state(''person.wesley'',
        ''home'') %}{% set kids = kids + [''Wesley''] %}{% endif %} {{ kids | join(''
        and '') }}

        '
  - parallel:
    - action: script.household_announce_message
      data:
        message: '{{ kids_home }}, 30 minutes until bedtime. Start winding down.'
        entity_id: media_player.mini_speakers
  mode: single
- id: kids_bedtime_10min_warning
  alias: 'Valerie: Bedtime 10 minute warning — 8:20pm'
  description: 10 minute warning before 8:30pm bedtime
  triggers:
  - trigger: time
    at: '20:20:00'
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: person.valerie
      state: home
    - condition: state
      entity_id: person.wesley
      state: home
  actions:
  - variables:
      kids_home: '{% set kids = [] %} {% if is_state(''person.valerie'', ''home'')
        %}{% set kids = kids + [''Valerie''] %}{% endif %} {% if is_state(''person.wesley'',
        ''home'') %}{% set kids = kids + [''Wesley''] %}{% endif %} {{ kids | join(''
        and '') }}

        '
  - parallel:
    - action: script.household_announce_message
      data:
        message: '{{ kids_home }}, 10 minutes until bedtime. Time to brush teeth.'
        entity_id: media_player.mini_speakers
    - if:
      - condition: state
        entity_id: person.valerie
        state: home
      then:
      - action: script.household_announce_message
        data:
          message: Valerie, 10 minutes. Brush your teeth.
          entity_id: media_player.valerie_speaker
    - if:
      - condition: state
        entity_id: person.wesley
        state: home
      then:
      - action: script.household_announce_message
        data:
          message: Wesley, 10 minutes. Brush your teeth.
          entity_id: media_player.wesley_speaker
  mode: single
- id: kids_bedtime_830pm
  alias: 'Valerie: Bedtime sequence — 8:30pm'
  description: 'At 8:30pm: turn off TV if playing, dim kids room lights, play soft
    music on their speakers.

    '
  triggers:
  - trigger: time
    at: '20:30:00'
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: person.valerie
      state: home
    - condition: state
      entity_id: person.wesley
      state: home
  actions:
  - if:
    - condition: state
      entity_id: media_player.shield
      state: playing
    then:
    - action: media_player.turn_off
      target:
        entity_id:
        - media_player.shield
        - media_player.shield_2
  - if:
    - condition: state
      entity_id: person.valerie
      state: home
    then:
    - action: light.turn_on
      target:
        entity_id: light.valerie
      data:
        brightness_pct: 20
        kelvin: 2700
        transition: 30
    - action: media_player.volume_set
      target:
        entity_id: media_player.valerie_speaker
      data:
        volume_level: 0.2
    - action: tts.google_cloud_say
      data:
        entity_id: media_player.valerie_speaker
        message: Valerie, it's bedtime. Good night.
  - if:
    - condition: state
      entity_id: person.wesley
      state: home
    then:
    - action: light.turn_on
      target:
        entity_id: light.wesley
      data:
        brightness_pct: 20
        kelvin: 2700
        transition: 30
    - action: media_player.volume_set
      target:
        entity_id:
        - media_player.mons_office_speaker
      data:
        volume_level: 0.2
    - action: tts.google_cloud_say
      data:
        entity_id: media_player.wesley_speaker
        message: Wesley, it's bedtime. Good night.
  mode: single
