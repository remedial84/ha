- id: '1691112200527'
  alias: 'Notify: Velop Information'
  description: ''
  triggers:
  - event_type: linksys_velop_event
    event_data:
      subtype: new_device
    id: Device Found
    trigger: event
  - event_type: linksys_velop_event
    event_data:
      subtype: new_node
    id: Node Found
    trigger: event
  - event_type: linksys_velop_event
    event_data:
      subtype: new_primary_node
    id: Primary Node Changed
    trigger: event
  - event_type: linksys_velop_event
    event_data:
      subtype: logging_stopped
    id: Logging Stopped
    trigger: event
  conditions: []
  actions:
  - variables:
      title_prefix: 'Linksys Velop - '
  - if:
    - condition: template
      value_template: '{{ trigger.id in ["Logging Stopped"] }}'
    then:
    - variables:
        notification_id: logging_stopped
        message: Logging has stopped for {{ trigger.event.data.get('name') }}
    - data:
        notification_id: '{{ notification_id }}'
        title: '{{ title_prefix }}{{ trigger.id }}'
        message: '{{ message }}'
      action: persistent_notification.create
    else:
    - variables:
        notification_id: '{{ trigger.event.event_type }}_{{ trigger.event.data.get(''unique_id'')
          or trigger.event.data.get(''serial'') }}'
        message: "{% if trigger.event.data.get('name') is not none %}\n  ## {{ trigger.event.data.name
          }}\n{% endif %}\n|   |   |   |\n|---|---|---| {% if trigger.event.data.get('mesh_device_id')
          is not none %}\n|Mesh:|&emsp;|{{ device_attr(trigger.event.data.mesh_device_id,
          'name_by_user') or device_attr(trigger.event.data.mesh_device_id, 'name')
          }}| {% endif %} {% if trigger.event.data.get('parent_name') is not none
          %}\n|Parent:|&emsp;|{{ trigger.event.data.parent_name }}| {% endif %} {%
          if trigger.event.data.get('host') is not none %}\n|Host:|&emsp;|{{ trigger.event.data.host
          }}| {% endif %} {% if trigger.event.data.get('connected_adapters') is not
          none and trigger.event.data.get('connected_adapters') | count > 0 %}\n|Guest:|&emsp;|{{
          'Yes' if trigger.event.data.connected_adapters[0].get('guest_network', False)
          is eq true else 'No' }}|\n|IP:|&emsp;|{{ trigger.event.data.connected_adapters[0].get('ip',
          'N/A') }}|\n|MAC:|&emsp;|{{ trigger.event.data.connected_adapters[0].get('mac',
          'N/A') }}| {% endif %} {% if trigger.event.data.get('description') is not
          none %}\n|Description:|&emsp;|{{ trigger.event.data.description }}| {% endif
          %} {% if trigger.event.data.get('manufacturer') is not none %}\n|Manufacturer:|&emsp;|{{
          trigger.event.data.manufacturer }}| {% endif %} {% if trigger.event.data.get('model')
          is not none %}\n|Model:|&emsp;|{{ trigger.event.data.model }}| {% endif
          %} {% if trigger.event.data.get('serial') is not none %}\n|Serial:|&emsp;|{{
          trigger.event.data.serial }}| {% endif %} {% if trigger.event.data.get('operating_system')
          is not none %}\n|Operating System:|&emsp;|{{ trigger.event.data.operating_system
          }}| {% endif %}"
    - data:
        notification_id: '{{ notification_id }}'
        title: '{{ title_prefix }}{{ trigger.id }}'
        message: '{{ message }}'
      action: persistent_notification.create
    - action: notify.mobile_app_pixel_9_pro_xl
      data: {}
  mode: parallel
