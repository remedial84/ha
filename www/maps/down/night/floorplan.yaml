type: picture-elements
image: /local/floorplan/base.png?version=760431364A98CB21CAEB0E0EA2D940E3
elements:
  - type: custom:config-template-card
    variables:
      LIGHT_STATE: states['light.rumpus'].state
      COLOR_MODE: states['light.rumpus'].attributes.color_mode
      LIGHT_COLOR: states['light.rumpus'].attributes.hs_color
      BRIGHTNESS: states['light.rumpus'].attributes.brightness
    entities:
      - light.rumpus
    element:
      type: image
      image: /local/floorplan/transparent.png?version=56ABE4CBC175363DA0810882244B34FF
      state_image:
        'on': >-
          ${COLOR_MODE === 'color_temp' || (COLOR_MODE === 'rgb' && LIGHT_COLOR && LIGHT_COLOR[0] == 0 && LIGHT_COLOR[1] == 0) ?
          '/local/floorplan/light.rumpus.png?version=BFF21396DAC91CB815DF74D1D14CE424' :
          '/local/floorplan/light.rumpus.red.png?version=CDBD51E0029F40AB366E4A4089E57AEF' }
      entity: light.rumpus
    style:
      filter: '${ "hue-rotate(" + (LIGHT_COLOR ? LIGHT_COLOR[0] : 0) + "deg)"}'
      opacity: '${LIGHT_STATE === ''on'' ? (BRIGHTNESS / 255) : ''100''}'
      mix-blend-mode: lighten
      pointer-events: none
      left: 50%
      top: 50%
      width: 100%
