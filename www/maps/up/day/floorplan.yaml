type: picture-elements
image: /local/floorplan/base.png?version=2A5B0BA7691624BD44009FA200C54C16
elements:
  - type: custom:config-template-card
    variables:
      LIGHT_STATE: states['light.office'].state
      COLOR_MODE: states['light.office'].attributes.color_mode
      LIGHT_COLOR: states['light.office'].attributes.hs_color
      BRIGHTNESS: states['light.office'].attributes.brightness
    entities:
      - light.office
    element:
      type: image
      image: /local/floorplan/transparent.png?version=56ABE4CBC175363DA0810882244B34FF
      state_image:
        'on': >-
          ${COLOR_MODE === 'color_temp' || (COLOR_MODE === 'rgb' && LIGHT_COLOR && LIGHT_COLOR[0] == 0 && LIGHT_COLOR[1] == 0) ?
          '/local/floorplan/light.office.png?version=7A5B0448A7DA223EA8E5C887B9A91C96' :
          '/local/floorplan/light.office.red.png?version=77E491AFBA3865337A6F8D0E520A98B4' }
      entity: light.office
    style:
      filter: '${ "hue-rotate(" + (LIGHT_COLOR ? LIGHT_COLOR[0] : 0) + "deg)"}'
      opacity: '${LIGHT_STATE === ''on'' ? (BRIGHTNESS / 255) : ''100''}'
      mix-blend-mode: lighten
      pointer-events: none
      left: 50%
      top: 50%
      width: 100%
