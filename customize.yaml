sensor.washer:
  templates:
    icon_color: 'if (state == ''on'') return ''orange'';

      '
sensor.aarlo_temperature_baby_monitor:
  templates:
    icon_color: "if (state > 25) {\n      var hue = 0;\n    } else if (state < 15\
      \ ) {\n      var hue = 250;\n    } else {\n      var hue = Math.round((25 -\
      \ Number(state))/10*250);\n    }\nreturn 'hsl(' + hue + ',80%,50%)';    \n"
sensor.wesley_motion_temperature:
  templates:
    icon_color: "if (state > 25) {\n      var hue = 0;\n    } else if (state < 15\
      \ ) {\n      var hue = 250;\n    } else {\n      var hue = Math.round((25 -\
      \ Number(state))/10*250);\n    }\nreturn 'hsl(' + hue + ',80%,50%)';    \n" 
