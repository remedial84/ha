homeassistant:
  customize: !include customize.yaml
  customize_glob: !include customize_glob.yaml
  customize_domain: !include customize_domain.yaml
  packages: 
    watchdog: !include packages/watchdog.yaml
# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

#Reverse Proxy
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.14.0/23  # Add the IP address of the proxy server
    - 172.30.33.0/24 # Docker container 
    - 127.0.0.1       # Localhost
    - ::1             # IPv6 Localhost

# Text to speech
tts:
  - platform: google_translate
  - platform: google_cloud
    key_file: google_cloud.json
    voice: en-AU-Chirp3-HD-Leda
    profiles:
      - small-bluetooth-speaker-class-device

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

config:

python_script:

conversation:

frontend:
  themes: !include_dir_merge_named themes

logger:
  default: warning
  logs:
    homeassistant.components.python_script: info
    homeassistant.helpers.entity: fatal   

notify:
  - name: allphones
    platform: group
    services:
      - service: mobile_app_pixel_9_pro_fold
      - service: mobile_app_pixel_9_pro_xl
      - service: mobile_app_yinlay
      - service: mobile_app_yins_iphone
  - platform: discord
    token: !secret discord_tok
    name: twelve      

