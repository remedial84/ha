template:
  - sensor:
    - name: "Garbage"
      unique_id: sensor.garbage
      icon: "mdi:trash-can-outline"
      state: >
        {% set midnight = today_at() %}
        {% set event = state_attr('calendar.garbage', 'start_time') | as_datetime | as_local %}
        {% set delta = event - midnight %}
        {% if delta.days == 0 %}
          0
        {% elif delta.days == 1 %}
          1
        {% elif delta.days > 1 %}
          2
        {% endif %}
    - name: "Recycling"
      unique_id: sensor.recycling
      icon: "mdi:recycle"
      state: >
        {% set midnight = today_at() %}
        {% set event = state_attr('calendar.recycling', 'start_time') | as_datetime | as_local %}
        {% set delta = event - midnight %}
        {% if delta.days == 0 %}
          0
        {% elif delta.days == 1 %}
          1
        {% elif delta.days > 1 %}
          2
        {% endif %}
    - name: "Green Waste"
      unique_id: sensor.green_waste
      icon: "mdi:leaf-circle-outline"
      state: >
        {% set midnight = today_at() %}
        {% set event = state_attr('calendar.green_waste', 'start_time') | as_datetime | as_local %}
        {% set delta = event - midnight %}
        {% if delta.days == 0 %}
          0
        {% elif delta.days == 1 %}
          1
        {% elif delta.days > 1 %}
          2
        {% endif %}
  - switch:
    - unique_id: switch.popups_station
      turn_on:
      - data_template:
          entity_id: binary_sensor.popup_station_running
          run_seconds: '{{ ((states(''input_number.station_run_time'') | float) * 60)
            | int }}'
        action: opensprinkler.run
      turn_off:
      - data:
          entity_id: binary_sensor.popup_station_running
        action: opensprinkler.stop
      default_entity_id: switch.popups_station
      icon: mdi:sprinkler
      name: Popups Station
      state: '{{ is_state(''binary_sensor.popup_station_running'', ''on'') }}'
  - switch:
    - unique_id: switch.tap_station
      turn_on:
      - data_template:
          entity_id: binary_sensor.tap_station_running
          run_seconds: '{{ ((states(''input_number.station_run_time'') | float) * 60)
            | int }}'
        action: opensprinkler.run
      turn_off:
      - data:
          entity_id: binary_sensor.tap_station_running
        action: opensprinkler.stop
      default_entity_id: switch.tap_station
      icon: mdi:water-pump
      name: Tap Station
      state: '{{ is_state(''binary_sensor.tap_station_running'', ''on'') }}'
  - switch:
    - unique_id: switch.veggie_patch_station
      turn_on:
      - data_template:
          entity_id: binary_sensor.veggie_patch_station_running
          run_seconds: '{{ ((states(''input_number.station_run_time'') | float) * 60)
            | int }}'
        action: opensprinkler.run
      turn_off:
      - data:
          entity_id: binary_sensor.veggie_patch_station_running
        action: opensprinkler.stop
      default_entity_id: switch.veggie_patch_station
      icon: mdi:flower
      name: Veggie Patch Station
      state: '{{ is_state(''binary_sensor.veggie_patch_station_running'', ''on'') }}'
  - switch:
    - unique_id: switch.plugged_station
      turn_on:
      - data_template:
          entity_id: binary_sensor.plugged_station_running
          run_seconds: '{{ ((states(''input_number.station_run_time'') | float) * 60)
