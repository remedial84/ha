        - Garden Bed
        - Veggie Patch
        - Irrigation
        - Back Fence

    # ─── LIGHTS ──────────────────────────────────────────────────────────────
    # Strategy: expose Hue group entities only, hide individual bulbs.
    # This prevents Google from trying to control both the group and
    # individual bulbs simultaneously, which causes partial/conflicting control.

    # Hue groups — exposed with friendly voice names
    light.upstairs:
      name: Upstairs Light
      aliases:
        - Upstairs
        - Upstairs lights
    light.downstairs:
      name: Downstairs Light
      aliases:
        - Downstairs
        - Downstairs lights
    light.valeries:
      name: Valerie's Light
      aliases:
        - Valerie's room
        - Valerie's bedroom
    light.hallway_light:
      name: Hallway Light
      aliases:
        - Hallway
    light.master_bedroom_light:
      name: Master Bedroom Light
      aliases:
        - Bedroom light
        - Master bedroom
        - Our bedroom
    light.office:
      name: Office Light
      aliases:
        - Office
        - Office lights
    light.deck:
      name: Deck Light
      aliases:
        - Deck
        - Deck lights
        - Outside lights
    light.foyer:
      name: Foyer Light
      aliases:
        - Foyer
        - Entry
        - Entrance

    # Individual bulbs and downlights — hide from Google to avoid conflicts
    # Google controls rooms via the group entities above
    light.hallway_1:
      expose: false
    light.hallway_2:
      expose: false
    light.hallway_3:
      expose: false
    light.hallway_4:
