title: Select Things
views:
  - icon: mdi:cellphone
    path: mobile
    title: Mobile
    visible:
      - user: 9b712eeea710495593f1ed78084787a1
      - user: 049db4bc2db342f3801bea6864e9a780
      - user: 8feab65bc16a465ba3e928aef74a91b1
      - user: 4b488115cd97408186fbb1ad924271ad
    badges: []
    cards:
      - type: conditional
        conditions:
          - entity: group.people
            state: home
        card:
          card:
            type: glance
            show_state: false
            title: Who is home?
            show_header_toggle: false
          type: custom:auto-entities
          filter:
            include:
              - domain: person
                state: home
      - type: conditional
        conditions:
          - entity: group.people
            state: not_home
        card:
          type: markdown
          content: Best check you turned things off.
          title: No one is at home.
