    - name: "Watchdog: Temperature guard"
      unique_id: watchdog_temp_guard
      icon: mdi:thermometer-alert
      state: >
        {% set last = state_attr('automation.fuck_you_myat_mon_stop_changing_the_temperature', 'last_triggered') %}
        {% if last == None %}never
        {% elif (now() - last.replace(tzinfo=now().tzinfo)).days > states('input_number.watchdog_low_freq_days') | int %}stale
