# Automation Watchdog Package
# Add to configuration.yaml: packages: watchdog: !include packages/watchdog.yaml
# Or paste each section into the appropriate file

# ─────────────────────────────────────────────
# INPUT NUMBERS — staleness thresholds (days)
# Adjust these to tune sensitivity
# ─────────────────────────────────────────────
input_number:
  watchdog_high_freq_days:
    name: "Watchdog: High frequency alert threshold"
    min: 1
    max: 30
    step: 1
    initial: 7
    unit_of_measurement: days
    icon: mdi:clock-alert

  watchdog_low_freq_days:
    name: "Watchdog: Low frequency alert threshold"
    min: 30
    max: 365
    step: 1
    initial: 90
    unit_of_measurement: days
    icon: mdi:clock-alert-outline

# ─────────────────────────────────────────────
# TEMPLATE SENSORS
# One sensor per watched automation
# state = 'ok', 'stale', or 'never'
# ─────────────────────────────────────────────
template:
  - sensor:

    # ── HIGH FREQUENCY ──────────────────────
    # These should fire at least weekly.
    # Alert after watchdog_high_freq_days.

    - name: "Watchdog: Set theme sunset"
      unique_id: watchdog_set_theme_sunset
      icon: mdi:theme-light-dark
      state: >
        {% set last = state_attr('automation.set_theme_when_the_sun_is_set', 'last_triggered') %}
        {% if last == None %}never
        {% elif (now() - last.replace(tzinfo=now().tzinfo)).days > states('input_number.watchdog_high_freq_days') | int %}stale
        {% else %}ok{% endif %}

    - name: "Watchdog: Set theme sunrise"
      unique_id: watchdog_set_theme_sunrise
      icon: mdi:theme-light-dark
