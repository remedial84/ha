    - name: "Watchdog: No TV for Valerie"
      unique_id: watchdog_no_tv_valerie
      icon: mdi:television-off
      state: >
        {% set last = state_attr('automation.no_tv_for_valerie_in_the_morning', 'last_triggered') %}
        {% if last == None %}never
        {% elif (now() - last.replace(tzinfo=now().tzinfo)).days > states('input_number.watchdog_low_freq_days') | int %}stale
        {% else %}ok{% endif %}

    # ── SUMMARY SENSOR ──────────────────────
    # Single sensor you can put on a dashboard
    # or use as a notification trigger

    - name: "Watchdog: Summary"
      unique_id: watchdog_summary
      icon: >
        {% if states | selectattr('entity_id', 'search', 'sensor.watchdog_') | selectattr('state', 'in', ['stale', 'never']) | list | count > 0 %}
          mdi:alert-circle
        {% else %}
          mdi:check-circle
        {% endif %}
      state: >
        {% set issues = states | selectattr('entity_id', 'search', 'sensor.watchdog_')
           | selectattr('state', 'in', ['stale', 'never'])
           | list %}
        {% if issues | count == 0 %}ok
        {% else %}{{ issues | count }} issue{{ 's' if issues | count > 1 }}{% endif %}
      attributes:
        never_triggered: >
          {{ states | selectattr('entity_id', 'search', 'sensor.watchdog_')
             | selectattr('state', 'eq', 'never')
             | map(attribute='name') | list }}
        stale: >
          {{ states | selectattr('entity_id', 'search', 'sensor.watchdog_')
             | selectattr('state', 'eq', 'stale')
             | map(attribute='name') | list }}
        ok_count: >
          {{ states | selectattr('entity_id', 'search', 'sensor.watchdog_')
             | selectattr('state', 'eq', 'ok')
             | list | count }}

# ─────────────────────────────────────────────
# AUTOMATION — daily notification if issues found
# Fires at 9am, only notifies if there are problems
# ─────────────────────────────────────────────
automation:
  - id: watchdog_daily_report
    alias: "System: Automation watchdog daily report"
    description: "Notify Chris if any automations are stale or have never triggered"
    triggers:
      - trigger: time
        at: "09:00:00"
    conditions:
      - condition: template
        value_template: "{{ states('sensor.watchdog_summary') != 'ok' }}"
    actions:
      - action: notify.mobile_app_pixel_9_pro_xl
        data:
          title: "🔧 Automation health: {{ states('sensor.watchdog_summary') }}"
          message: >
            {% set never = state_attr('sensor.watchdog_summary', 'never_triggered') %}
            {% set stale = state_attr('sensor.watchdog_summary', 'stale') %}
            {% if never | count > 0 %}Never triggered: {{ never | join(', ') | replace('Watchdog: ', '') }}.{% endif %}
            {% if stale | count > 0 %} Stale: {{ stale | join(', ') | replace('Watchdog: ', '') }}.{% endif %}
          data:
            url: /config/automation
            tag: watchdog_report
            sticky: false