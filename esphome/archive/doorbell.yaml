esphome:
  name: doorbell
  platform: ESP8266
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  password: "a84c82c439e37c8d7a21b583b7ee05ef"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Doorbell Fallback Hotspot"
    password: "V34Jmfg397eu"

captive_portal:

switch:
  # Switch to restart the doorbell.
  - platform: restart
    name: Doorbell Restart

remote_receiver:
  pin: 
    number: D4  #GPIO5= D1
    #number: GPIO14  #GPIO14 = D5
    inverted: True
  dump: all
  #dump: rc_switch
  #filter: 150us
  #idle: 10ms
  # Settings to optimize recognition of RF devices
  #tolerance: 60%
  #filter: 4us
  #idle: 4ms
  #buffer_size: 2kb
  # Settings to optimize recognition of RF devices
  #tolerance: 50%
  #filter: 10us
  #idle: 6ms
  #buffer_size: 2kb